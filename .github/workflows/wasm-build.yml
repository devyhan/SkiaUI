name: WASM Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2.4
        run: |
          SWIFT_VERSION="swift-6.2.4-RELEASE"
          TOOLCHAIN_URL="https://download.swift.org/swift-6.2.4-release/ubuntu2404/${SWIFT_VERSION}/${SWIFT_VERSION}-ubuntu24.04.tar.gz"
          curl -sL "$TOOLCHAIN_URL" -o swift.tar.gz
          sudo tar xzf swift.tar.gz -C /opt
          echo "/opt/${SWIFT_VERSION}-ubuntu24.04/usr/bin" >> $GITHUB_PATH

      - name: Install Swift SDK for WebAssembly
        run: swift sdk install https://download.swift.org/swift-6.2.4-release/wasm-sdk/swift-6.2.4-RELEASE/swift-6.2.4-RELEASE_wasm.artifactbundle.tar.gz --checksum 32fdb8772d73bb174f77b5c59bc88a0d55003d75712832129394d3465158fb43

      - name: Build for WASM
        run: swift package --swift-sdk wasm32-unknown-wasip1 js -c debug
