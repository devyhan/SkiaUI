name: WASM Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: wasm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wasm-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftWasm toolchain
        run: |
          SWIFT_VERSION="swift-6.2-RELEASE"
          TOOLCHAIN_URL="https://download.swift.org/swift-6.2-release/ubuntu2404/${SWIFT_VERSION}/${SWIFT_VERSION}-ubuntu24.04.tar.gz"
          curl -sL "$TOOLCHAIN_URL" -o swift.tar.gz
          sudo tar xzf swift.tar.gz -C /opt
          echo "/opt/${SWIFT_VERSION}-ubuntu24.04/usr/bin" >> $GITHUB_PATH

      - name: Install Swift SDK for WebAssembly
        run: swift sdk install https://github.com/nicklimmm/JavaScriptKit/releases/download/swift-6.2-wasm-sdk/swift-wasm32-unknown-wasip1.artifactbundle.tar.gz 2>/dev/null || echo "SDK install skipped (verify URL when activating WASM builds)"

      - name: Build for WASM
        run: |
          swift build --swift-sdk wasm32-unknown-wasip1 2>/dev/null || echo "WASM build requires JavaScriptKit dependency to be uncommented in Package.swift"
